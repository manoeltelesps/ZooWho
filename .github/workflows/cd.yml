name: CD - Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release Archive
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project C08.xcodeproj -scheme C08

      - name: Run Tests before Release
        run: |
          xcodebuild test \
            -project C08.xcodeproj \
            -scheme C08 \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:C08Tests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Archive
        run: |
          xcodebuild archive \
            -project C08.xcodeproj \
            -scheme C08 \
            -archivePath ${{ runner.temp }}/C08.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ${{ runner.temp }}/export
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/C08.xcarchive \
            -exportPath ${{ runner.temp }}/export \
            -exportOptionsPlist ExportOptions.plist \
          || echo "Export requires signing. Archive saved as artifact."

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: C08-release-${{ github.ref_name }}
          path: ${{ runner.temp }}/C08.xcarchive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
